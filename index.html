<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lyras Multi-Domain Expiry Checker</title>
    <link rel="stylesheet" href="./styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>Lyras Multi-Domain Expiry Checker</h1>
            <p class="subtitle">Überprüfen Sie Registrierungsdatum und Ablaufdaten für mehrere Domains</p>
        </header>

        <main class="main-content">
            <div class="input-section card">
                <label for="domainInput" class="input-label">Domains eingeben (eine pro Zeile):</label>
                <textarea id="domainInput" placeholder="Beispiel:&#10;lyra.io&#10;lyra.it.com&#10;example.de&#10;test-domain.com" spellcheck="false"></textarea>
                <button id="checkBtn" onclick="checkDomains()">
                    <span class="btn-icon">🔍</span>
                    <span>Domains prüfen</span>
                </button>
            </div>

            <div id="results" class="results-section"></div>
        </main>

        <footer class="footer">
            <p>&copy; 2024 Lyra Multi-Domain Expiry Checker. Alle Rechte vorbehalten.</p>
        </footer>
    </div>

    <script>
        // Mock-Funktion zur Simulation von WHOIS-Daten
        // In einer Produktionsumgebung sollten Sie dies durch einen echten API-Aufruf ersetzen
        async function fetchDomainExpiry(domain) {
            // Simuliere Netzwerkverzögerung
            await new Promise(resolve => setTimeout(resolve, 300 + Math.random() * 500));
            
            // Generiere zufällige aber konsistente Daten basierend auf dem Domain-Namen
            const hash = domain.split('').reduce((acc, char) => acc + char.charCodeAt(0), 0);
            
            // Zufälliges Registrierungsdatum zwischen 1 und 5 Jahren in der Vergangenheit
            const registrationDate = new Date();
            registrationDate.setDate(registrationDate.getDate() - (365 * (1 + (hash % 5))));
            
            // Zufällige Ablaufdatum zwischen 1 Monat und 2 Jahren in der Zukunft
            const expiryDate = new Date();
            expiryDate.setDate(expiryDate.getDate() + (30 + (hash % 730)));
            
            // Bestimme Domain-Typ basierend auf der Endung
            let domainType = 'nTLD';
            if (domain.includes('.com') || domain.includes('.net') || domain.includes('.org')) {
                domainType = 'gTLD';
            } else if (domain.includes('.de') || domain.includes('.it') || domain.includes('.fr')) {
                domainType = 'ccTLD';
            } else if (domain.includes('.io') || domain.includes('.ai') || domain.includes('.co')) {
                domainType = 'nTLD';
            }
            
            // Berechne verbleibende Tage
            const daysRemaining = Math.ceil((expiryDate - new Date()) / (1000 * 60 * 60 * 24));
            
            return {
                domain: domain,
                registered: registrationDate.toLocaleDateString('de-DE'),
                expiry: expiryDate.toLocaleDateString('de-DE'),
                daysRemaining: daysRemaining,
                type: domainType,
                status: daysRemaining > 0 ? 'active' : 'expired'
            };
        }

        async function checkDomains() {
            const input = document.getElementById('domainInput').value;
            const domains = input.split('\n').map(d => d.trim()).filter(d => d);
            const resultsDiv = document.getElementById('results');
            const checkBtn = document.getElementById('checkBtn');
            
            if (domains.length === 0) {
                resultsDiv.innerHTML = '<div class="message warning">Bitte geben Sie mindestens eine Domain ein.</div>';
                return;
            }
            
            // UI in Ladezustand versetzen
            checkBtn.disabled = true;
            checkBtn.classList.add('loading');
            resultsDiv.innerHTML = '<div class="loading">Prüfe Domains... <span class="spinner"></span></div>';
            
            const results = [];
            
            for (const domain of domains) {
                try {
                    const data = await fetchDomainExpiry(domain);
                    results.push(data);
                } catch (error) {
                    console.error('Fehler bei Domain:', domain, error);
                    results.push({
                        domain: domain,
                        error: 'Fehler beim Abrufen der Daten'
                    });
                }
            }
            
            // Ergebnisse anzeigen
            displayResults(results);
            
            // Button wieder aktivieren
            checkBtn.disabled = false;
            checkBtn.classList.remove('loading');
        }

        function displayResults(results) {
            const resultsDiv = document.getElementById('results');
            
            if (results.length === 0) {
                resultsDiv.innerHTML = '<div class="message info">Keine Ergebnisse vorhanden.</div>';
                return;
            }
            
            let html = '<div class="results-grid">';
            
            results.forEach(result => {
                if (result.error) {
                    html += `
                        <div class="result-card error">
                            <div class="domain-header">
                                <h3>${escapeHtml(result.domain)}</h3>
                                <span class="status-badge error">Fehler</span>
                            </div>
                            <p class="error-message">${result.error}</p>
                        </div>
                    `;
                } else {
                    const daysClass = result.daysRemaining <= 30 ? 'warning' : result.daysRemaining <= 90 ? 'caution' : 'good';
                    const daysText = result.daysRemaining > 0 
                        ? `${result.daysRemaining} Tage` 
                        : 'Abgelaufen';
                    
                    html += `
                        <div class="result-card ${daysClass}">
                            <div class="domain-header">
                                <h3>${escapeHtml(result.domain)}</h3>
                                <span class="status-badge ${result.status}">${result.status === 'active' ? 'Aktiv' : 'Abgelaufen'}</span>
                            </div>
                            <div class="domain-info">
                                <div class="info-row">
                                    <span class="info-label">Typ:</span>
                                    <span class="info-value">${result.type}</span>
                                </div>
                                <div class="info-row">
                                    <span class="info-label">Registriert:</span>
                                    <span class="info-value">${result.registered}</span>
                                </div>
                                <div class="info-row">
                                    <span class="info-label">Ablaufdatum:</span>
                                    <span class="info-value">${result.expiry}</span>
                                </div>
                                <div class="info-row highlight">
                                    <span class="info-label">Verbleibend:</span>
                                    <span class="info-value ${daysClass}">${daysText}</span>
                                </div>
                            </div>
                        </div>
                    `;
                }
            });
            
            html += '</div>';
            resultsDiv.innerHTML = html;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Enter-Taste im Textarea unterstützt Strg+Enter zum Absenden
        document.getElementById('domainInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && e.ctrlKey) {
                checkDomains();
            }
        });
    </script>
</body>
</html>

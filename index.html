<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Lyras Multi-Domain Expiry Checker</title>\n    <style>\n        body {\n            font-family: Arial, sans-serif;\n            background-color: #f4f4f4;\n            color: #333;\n            margin: 0;\n            padding: 20px;\n        }\n        h1 {\n            text-align: center;\n        }\n        .container {\n            max-width: 600px;\n            margin: auto;\n            background: white;\n            padding: 20px;\n            border-radius: 8px;\n            box-shadow: 0 0 10px rgba(0,0,0,0.1);\n        }\n        textarea {\n            width: 100%;\n            height: 150px;\n            border-radius: 5px;\n            padding: 10px;\n            border: 1px solid #ccc;\n        }\n        button {\n            background-color: #4CAF50;\n            color: white;\n            border: none;\n            padding: 10px 20px;\n            border-radius: 5px;\n            cursor: pointer;\n        }\n        button:hover {\n            background-color: #45a049;\n        }\n    </style>\n</head>\n<body>\n    <div class="container">\n        <h1>Lyras Multi-Domain Expiry Checker</h1>\n        <textarea id="domainInput" placeholder="Enter domains here, one per line..."></textarea>\n        <button onclick="checkDomains()">Check Expiry Dates</button>\n        <div id="results"></div>\n    </div>\n    <script>\n        async function checkDomains() {\n            const input = document.getElementById('domainInput').value;\n            const domains = input.split('\n').map(d => d.trim()).filter(d => d);\n            const resultsDiv = document.getElementById('results');\n            resultsDiv.innerHTML = ''; // Clear previous results\n\n            for (const domain of domains) {\n                const expiryDate = await fetchDomainExpiry(domain);\n                const resultText = expiryDate ? `Domain: ${domain} - Expiry Date: ${expiryDate}` : `Domain: ${domain} - Could not fetch data.`;\n                resultsDiv.innerHTML += `<p>${resultText}</p>`;\n            }\n        }\n\n        async function fetchDomainExpiry(domain) {\n            try {\n                const response = await fetch(`https://api.domaincheck.com/${domain}`); // Placeholder API URL\n                const data = await response.json();\n                return data.expiryDate || 'Not available';\n            } catch (error) {\n                console.error('Error fetching domain:', error);\n                return null;\n            }\n        }\n    </script>\n</body>\n</html>\n
